name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Astro 6 requires Node >= 22.12.0 (see https://docs.astro.build/en/guides/deploy/)
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (extension)
        run: bun install --frozen-lockfile

      - name: Install dependencies (website)
        working-directory: website
        run: bun install --frozen-lockfile

      - name: Lint & format check
        run: bun run check

      - name: Build extension (Chrome)
        run: bun run build

      - name: Build website
        working-directory: website
        run: bun run build
